after-startup-command = ['exec-and-forget sketchybar']

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# Start AeroSpace at login
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
default-root-container-orientation = 'horizontal'

# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.top = [{ monitor.'LG ULTRAGEAR' = 38 }, { monitor.'built-in' = 10 }, 10]
outer.bottom = 8
outer.left = 8
outer.right = 8

[mode.main.binding]
# terminal shortcuts
# cmd-enter = '''exec-and-forget open -na /Applications/Ghostty.app'''
alt-enter = '''exec-and-forget open -na /Applications/Ghostty.app'''

# layout switch
alt-minus = 'layout tiles horizontal vertical'
alt-backslash = 'layout accordion horizontal vertical'

# join between windows
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'

# switch focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# swap windows
alt-shift-h = 'swap left --wrap-around'
alt-shift-j = 'swap down --wrap-around'
alt-shift-k = 'swap up --wrap-around'
alt-shift-l = 'swap right --wrap-around'

# resize windows
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-q = 'workspace Q'
alt-w = 'workspace W'
alt-e = 'workspace E'

# move windows to workspaces
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-q = 'move-node-to-workspace Q'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-e = 'move-node-to-workspace E'

# alt-tab behavior
alt-tab = 'workspace-back-and-forth'

# move all windows to monitor (if connected to external monitor)
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']


[workspace-to-monitor-force-assignment]
1 = 'secondary'
2 = 'secondary'
3 = 'secondary'

[[on-window-detected]]
if.app-id = 'com.logi.cp-dev-mgr'
if.app-name-regex-substring = 'logi'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.if.Amphetamine'
if.app-name-regex-substring = 'amphetamine'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
if.app-name-regex-substring = 'whatsapp'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.freemacsoft.AppCleaner'
if.app-name-regex-substring = 'AppCleaner'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.app-name-regex-substring = 'finder'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.bitgapp.eqmac'
if.app-name-regex-substring = 'eqMac'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
run = ['layout floating']
