after-login-command = []

after-startup-command = [
  'exec-and-forget sketchybar',
  'exec-and-forget borders',
]

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# Start AeroSpace at login
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
default-root-container-orientation = 'auto'

# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.bottom = 12
outer.top = [{ monitor.secondary = 38 }, 8]
outer.right = 12

[mode.main.binding]
# terminal shortcuts
cmd-enter = '''exec-and-forget open -na /Applications/Ghostty.app'''
alt-t = '''exec-and-forget open -na /Applications/kitty.app'''

# layout switch
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# join between windows
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'

# switch focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# swap windows
alt-shift-h = 'swap left --wrap-around'
alt-shift-j = 'swap down --wrap-around'
alt-shift-k = 'swap up --wrap-around'
alt-shift-l = 'swap right --wrap-around'

# resize windows
alt-minus = 'resize smart -60'
alt-equal = 'resize smart +60'

# switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'

# move windows to workspaces
alt-ctrl-1 = 'move-node-to-workspace 1'
alt-ctrl-2 = 'move-node-to-workspace 2'
alt-ctrl-3 = 'move-node-to-workspace 3'
alt-ctrl-4 = 'move-node-to-workspace 4'
alt-ctrl-5 = 'move-node-to-workspace 5'
alt-ctrl-6 = 'move-node-to-workspace 6'

# alt-tab behavior
alt-tab = 'workspace-back-and-forth'

# move all windows to monitor (if connected to external monitor)
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']

[workspace-to-monitor-force-assignment]
1 = 'secondary'
2 = 'secondary'
3 = 'secondary'

[[on-window-detected]]
if.app-id = 'com.logi.cp-dev-mgr'
if.app-name-regex-substring = 'logi'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.if.Amphetamine'
if.app-name-regex-substring = 'amphetamine'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
if.app-name-regex-substring = 'whatsapp'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.freemacsoft.AppCleaner'
if.app-name-regex-substring = 'AppCleaner'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.app-name-regex-substring = 'finder'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.bitgapp.eqmac'
if.app-name-regex-substring = 'eqMac'
run = ['layout floating']
